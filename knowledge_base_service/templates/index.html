<!DOCTYPE html>
<html>
<head>
    <title>知识库服务控制台</title>
    <meta charset="utf-8">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .content {
            padding: 30px;
        }
        
        .card {
            background: #fff;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            border: 1px solid #e9ecef;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
        }
        
        .card h2 {
            color: #495057;
            margin-bottom: 20px;
            font-size: 1.4em;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card h2::before {
            content: "🔍";
            font-size: 1.2em;
        }
        
        .card:nth-child(2) h2::before {
            content: "📁";
        }
        
        .card:nth-child(3) h2::before {
            content: "📚";
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #495057;
            font-size: 0.95em;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            margin-bottom: 15px;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .controls-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 15px 0;
        }
        
        @media (max-width: 600px) {
            .controls-row {
                grid-template-columns: 1fr;
            }
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:disabled {
            background: #adb5bd;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .btn-row {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }
        
        .btn-row a {
            text-decoration: none;
        }
        
        .message {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            font-weight: 500;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .loading {
            text-align: center;
            color: #6c757d;
            font-style: italic;
            padding: 20px;
        }
        
        footer {
            text-align: center;
            padding: 20px;
            color: #6c757d;
            font-size: 0.9em;
            border-top: 1px solid #e9ecef;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>知识库服务控制台</h1>
            <p class="subtitle">智能知识采集与管理系统</p>
        </header>
        
        <div class="content">
            <div class="navigation-links" style="text-align: center; margin-bottom: 20px;">
                <a href="/" class="nav-link" style="text-decoration: none; padding: 8px 16px; margin: 0 10px; border-radius: 6px; background: #667eea; color: white;">首页</a>
                <a href="/knowledge" class="nav-link" style="text-decoration: none; padding: 8px 16px; margin: 0 10px; border-radius: 6px; background: #e9ecef; color: #495057;">知识库</a>
                <a href="/add_knowledge" class="nav-link" style="text-decoration: none; padding: 8px 16px; margin: 0 10px; border-radius: 6px; background: #e9ecef; color: #495057;">➕ 添加知识</a>
                <a href="/edit_knowledge" class="nav-link" style="text-decoration: none; padding: 8px 16px; margin: 0 10px; border-radius: 6px; background: #e9ecef; color: #495057;">✏️ 编辑知识</a>
                <a href="/api/docs" class="nav-link" style="text-decoration: none; padding: 8px 16px; margin: 0 10px; border-radius: 6px; background: #e9ecef; color: #495057;">API文档</a>
            </div>
            <div class="card">
                <h2>网页爬虫</h2>
                <form id="crawlerForm">
                    <label for="topic">爬取主题 *</label>
                    <input type="text" id="topic" placeholder="请输入您想要爬取的主题，例如：人工智能发展趋势" required>
                    
                    <label for="requirements">具体要求</label>
                    <textarea id="requirements" placeholder="请详细描述您的爬取要求，例如：关注最新技术、市场趋势、应用场景等"></textarea>
                    
                    <div class="controls-row">
                    <div class="control-group">
                        <label for="numQueries">生成查询数量 (1-10)</label>
                        <input type="number" id="numQueries" value="5" min="1" max="10">
                    </div>
                    
                    <div class="control-group">
                        <label for="maxResults">每查询最大结果数 (1-50)</label>
                        <input type="number" id="maxResults" value="10" min="1" max="50">
                    </div>
                    
                    <div class="control-group">
                        <label for="maxConcurrent">最大并发数 (1-10)</label>
                        <input type="number" id="maxConcurrent" value="3" min="1" max="10">
                    </div>
                </div>
                
                <button type="submit" id="crawlSubmitBtn">🚀 开始智能爬取</button>
                </form>
                <div id="crawlerMessage" class="message" style="display:none;"></div>
            </div>
            
            <div class="card">
                <h2>文档上传</h2>
                <form id="uploadForm" enctype="multipart/form-data">
                    <label for="documents">上传文档</label>
                    <input type="file" id="documents" name="documents" multiple accept=".pdf,.doc,.docx,.xls,.xlsx,.txt,.png,.jpg,.jpeg" required>
                    <small style="color: #6c757d; display: block; margin-top: 5px;">支持格式：PDF, Word, Excel, TXT, PNG, JPG, JPEG</small>
                    
                    <button type="submit">📤 上传并处理</button>
                </form>
                <div id="uploadMessage" class="message" style="display:none;"></div>
            </div>
            

        </div>
        
        <footer>
            <p>知识库服务 v1.0 · 智能知识管理系统</p>
        </footer>
    </div>
    
    <script>
        document.getElementById('crawlerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const topic = document.getElementById('topic').value.trim();
            const requirements = document.getElementById('requirements').value.trim();
            const numQueries = parseInt(document.getElementById('numQueries').value);
            const maxResults = parseInt(document.getElementById('maxResults').value);
            const maxConcurrent = parseInt(document.getElementById('maxConcurrent').value);
            const messageDiv = document.getElementById('crawlerMessage');
            const submitButton = document.getElementById('crawlSubmitBtn');
            
            if (!topic) {
                messageDiv.textContent = '请先输入爬取主题';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                return;
            }
            
            // 显示提交状态
            submitButton.disabled = true;
            submitButton.textContent = '⏳ 处理中...';
            messageDiv.innerHTML = '<div class="loading">正在启动智能爬取任务...</div>';
            messageDiv.className = 'message success';
            messageDiv.style.display = 'block';
            
            try {
                // 发送初始请求获取生成的查询
                const response = await fetch('/api/v1/crawl', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        topic, 
                        requirements, 
                        storage_method: "file", // 现在只支持文件存储
                        max_results_per_query: parseInt(maxResults),
                        num_queries: parseInt(numQueries), // 添加查询数量参数
                        max_concurrent: parseInt(maxConcurrent) // 添加并发数参数
                    })
                });
                
                const result = await response.json();
                
                // 显示最终结果
                messageDiv.innerHTML = `
                    <div><strong>✅ ${result.msg}</strong></div>
                    <div>总共爬取: ${result.data.total_crawled} 个项目</div>
                    <div>使用查询: ${result.data.generated_queries?.length || 0} 个</div>
                    <details>
                        <summary>查看生成的查询</summary>
                        <ul>
                            ${(result.data.generated_queries || []).map(q => `<li>${q}</li>`).join('')}
                        </ul>
                    </details>
                `;
                messageDiv.className = 'message success';
            } catch (error) {
                messageDiv.innerHTML = `❌ 错误：${error.message}`;
                messageDiv.className = 'message error';
            } finally {
                // 恢复按钮状态
                submitButton.disabled = false;
                submitButton.textContent = '🚀 开始智能爬取';
            }
        });
        
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            const files = document.getElementById('documents').files;
            const messageDiv = document.getElementById('uploadMessage');
            const submitButton = document.querySelector('#uploadForm button');
            
            if (files.length === 0) {
                messageDiv.textContent = '请选择要上传的文件';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                return;
            }
            
            // 显示提交状态
            submitButton.disabled = true;
            submitButton.textContent = '⏳ 处理中...';
            messageDiv.textContent = '正在上传并处理文件...';
            messageDiv.className = 'message success';
            messageDiv.style.display = 'block';
            
            for (let i = 0; i < files.length; i++) {
                formData.append('files', files[i]);
            }
            
            try {
                const response = await fetch('/api/v1/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                messageDiv.textContent = result.msg;
                messageDiv.className = 'message success';
            } catch (error) {
                messageDiv.textContent = '❌ 错误：' + error.message;
                messageDiv.className = 'message error';
            } finally {
                // 恢复按钮状态
                submitButton.disabled = false;
                submitButton.textContent = '📤 上传并处理';
            }
        });
    </script>
</body>
</html>
